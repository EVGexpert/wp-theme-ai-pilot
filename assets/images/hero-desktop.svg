    <rect x="830" y="230" width="60" height="60" rx="4"/>
    <rect x="920" y="230" width="60" height="60" rx="4"/>
    <rect x="560" y="320" width="60" height="60" rx="4"/>
    <rect x="650" y="320" width="60" height="60" rx="4"/>
    <rect x="740" y="320" width="60" height="60" rx="4"/>
    <rect x="830" y="320" width="60" height="60" rx="4"/>
    <rect x="920" y="320" width="60" height="60" rx="4"/>
    <rect x="560" y="410" width="60" height="60" rx="4"/>
    <rect x="650" y="410" width="60" height="60" rx="4"/>
    <rect x="740" y="410" width="60" height="60" rx="4"/>
    <rect x="830" y="410" width="60" height="60" rx="4"/>
    <rect x="920" y="410" width="60" height="60" rx="4"/>
    <rect x="560" y="500" width="60" height="60" rx="4"/>
