  </defs>
  <rect width="1600" height="720" fill="url(#sky)"/>
  <rect x="0" y="540" width="1600" height="180" fill="#7d93a3" opacity="0.5"/>
  <!-- back towers -->
  <rect x="120" y="260" width="180" height="460" fill="#46586a"/>
  <rect x="330" y="200" width="150" height="520" fill="#516273"/>
  <rect x="1180" y="240" width="170" height="480" fill="#46586a"/>
  <!-- main building -->
