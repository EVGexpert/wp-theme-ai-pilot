<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Коммерческая недвижимость">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fb8c9"/>
      <stop offset="1" stop-color="#c7d8e3"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4a57"/>
      <stop offset="1" stop-color="#222c34"/>
